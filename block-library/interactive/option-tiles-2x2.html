<!--
  @component: option-tiles-2x2
  @category: interactive
  @tags: survey, options, tiles, grid, images
  @description: Image tiles in 2×2 grid

  @version: 1.0
-->
<div class="funnel-tiles"
     data-component="option-tiles-2x2"
     data-component-category="interactive"
     data-element-type="option-tiles">

  <button class="funnel-tile"
          data-element-type="tile"
          data-editable="true"
          data-value="tile-1"
          data-navigate-to="">
    <span class="funnel-tile__icon" data-element-type="tile-icon" data-editable="true">🏃</span>
    <span class="funnel-tile__label" data-element-type="tile-label" data-editable="true">Option A</span>
  </button>

  <button class="funnel-tile"
          data-element-type="tile"
          data-editable="true"
          data-value="tile-2"
          data-navigate-to="">
    <span class="funnel-tile__icon" data-element-type="tile-icon" data-editable="true">🧘</span>
    <span class="funnel-tile__label" data-element-type="tile-label" data-editable="true">Option B</span>
  </button>

  <button class="funnel-tile"
          data-element-type="tile"
          data-editable="true"
          data-value="tile-3"
          data-navigate-to="">
    <span class="funnel-tile__icon" data-element-type="tile-icon" data-editable="true">🚴</span>
    <span class="funnel-tile__label" data-element-type="tile-label" data-editable="true">Option C</span>
  </button>

  <button class="funnel-tile"
          data-element-type="tile"
          data-editable="true"
          data-value="tile-4"
          data-navigate-to="">
    <span class="funnel-tile__icon" data-element-type="tile-icon" data-editable="true">🏊</span>
    <span class="funnel-tile__label" data-element-type="tile-label" data-editable="true">Option D</span>
  </button>

</div>

<style>
  .funnel-tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    font-family: var(--font-family);
  }

  .funnel-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px 12px;
    background: var(--card-bg);
    border: 1.5px solid var(--border-tile);
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
  }

  .funnel-tile:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow);
  }

  .funnel-tile.selected {
    border-color: var(--accent);
    background: var(--accent);
  }

  .funnel-tile__icon {
    font-size: 32px;
    line-height: 1;
  }

  .funnel-tile__label {
    color: var(--text);
    font-family: var(--font-family);
    font-size: var(--option-font);
    font-weight: 500;
    text-align: center;
  }

  .funnel-tile.selected .funnel-tile__label {
    color: #fff;
  }
</style>
