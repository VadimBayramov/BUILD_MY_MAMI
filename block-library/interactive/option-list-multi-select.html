<div class="funnel-multi-options"

    <span class="funnel-multi-option__check" aria-hidden="true"></span>
    <span class="funnel-multi-option__text" data-element-type="option-text" data-editable="true">Option 1</span>

  <label class="funnel-multi-option"

<style>
  .funnel-multi-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    font-family: var(--font-family);
  }

  .funnel-multi-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px var(--pad-x);
    background: var(--card-bg);
    border: 1.5px solid var(--border-tile);
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
  }

  .funnel-multi-option:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow);
  }

  .funnel-multi-option.selected {
    border-color: var(--accent);
  }

  .funnel-multi-option__check {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border-tile);
    border-radius: var(--radius-sm);
    background: var(--bg);
    transition: var(--transition);
  }

  .funnel-multi-option.selected .funnel-multi-option__check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .funnel-multi-option__text {
    color: var(--text);
    font-size: var(--option-font);
    font-weight: 500;
