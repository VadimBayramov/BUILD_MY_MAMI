<!--
  @component: screen-email-capture
  @category: templates
  @tags: screen, email, capture, form, template
  @description: Email collection screen
  @thumbnail: /thumbnails/screen-email-capture.png
  @version: 1.0
-->
<div class="funnel-screen"
     data-component="screen-email-capture"
     data-component-category="templates"
     data-element-type="screen">

  <div class="funnel-screen__container">

    <div class="funnel-screen__header" data-element-type="screen-header">
      <div class="funnel-screen__progress-track">
        <div class="funnel-screen__progress-fill" style="width: 85%"></div>
      </div>
    </div>

    <div class="funnel-screen__body" data-element-type="screen-body">

      <h1 class="funnel-screen__heading"
          data-element-type="heading"
          data-editable="true">Where should we send your results?</h1>

      <p class="funnel-screen__sub"
         data-element-type="subheading"
         data-editable="true">Enter your email to receive your personalized plan.</p>

      <form class="funnel-capture-form"
            data-element-type="form"
            data-form-type="email-capture">

        <div class="funnel-input-group" data-element-type="input-group">
          <label class="funnel-input-label"
                 data-element-type="label"
                 data-editable="true"
                 for="screen-email">Email address</label>
          <input class="funnel-input"
                 type="email"
                 id="screen-email"
                 name="email"
                 placeholder="you@example.com"
                 data-element-type="input"
                 data-editable="true"
                 autocomplete="email"
                 required />
        </div>

        <button class="funnel-btn-primary"
                type="submit"
                data-element-type="submit-btn"
                data-editable="true"
                data-navigate-to="">
          Send My Plan →
        </button>

        <label class="funnel-consent__label" data-element-type="consent">
          <span class="funnel-consent__check" aria-hidden="true"></span>
          <span class="funnel-consent__text"
                data-element-type="consent-text"
                data-editable="true">
            I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
          </span>
        </label>

      </form>

    </div>

  </div>

</div>

<style>
  .funnel-screen {
    display: flex;
    flex-direction: column;
    width: 100%;
    min-height: 100%;
    background: var(--bg);
    font-family: var(--font-family);
  }

  .funnel-screen__container {
    width: 100%;
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 0 var(--pad-x) var(--pad-y);
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .funnel-screen__header {
    padding: 16px 0 20px;
  }

  .funnel-screen__progress-track {
    width: 100%;
    height: 4px;
    background: var(--border-tile);
    border-radius: 2px;
    overflow: hidden;
  }

  .funnel-screen__progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }

  .funnel-screen__body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .funnel-screen__heading {
    margin: 0;
    color: var(--text);
    font-size: var(--h1-size);
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
  }

  .funnel-screen__sub {
    margin: 0;
    color: var(--text-muted);
    font-size: var(--body-size);
    text-align: center;
  }

  .funnel-capture-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .funnel-input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .funnel-input-label {
    color: var(--text);
    font-size: var(--body-size);
    font-weight: 600;
  }

  .funnel-input {
    width: 100%;
    padding: 12px var(--pad-x);
    background: var(--card-bg);
    border: 1.5px solid var(--border-tile);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-family);
    font-size: var(--body-size);
    outline: none;
    transition: var(--transition);
    box-sizing: border-box;
  }

  .funnel-input::placeholder { color: var(--text-muted); }

  .funnel-input:focus {
    border-color: var(--accent);
  }

  .funnel-btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 16px var(--pad-x);
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: var(--font-family);
    font-size: var(--option-font);
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: var(--shadow);
  }

  .funnel-btn-primary:hover { background: var(--accent-hover); }

  .funnel-consent__label {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    cursor: pointer;
  }

  .funnel-consent__check {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    margin-top: 2px;
    border: 2px solid var(--border-tile);
    border-radius: var(--radius-sm);
    background: var(--bg);
  }

  .funnel-consent__text {
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .funnel-consent__text a {
    color: var(--accent);
    text-decoration: underline;
  }
</style>
