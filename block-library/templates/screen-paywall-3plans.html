<div class="funnel-screen"

            <span class="funnel-plan__amount">29</span>
            <span class="funnel-plan__period">/mo</span>
          </div>
          <button class="funnel-plan__btn" data-element-type="plan-btn" data-navigate-to="">Choose</button>
        </div>

        <div class="funnel-plan funnel-plan--featured"
             data-element-type="plan"
             data-editable="true"
             data-plan-id="annual">

            <span class="funnel-plan__period">/mo</span>
          </div>
          <button class="funnel-plan__btn funnel-plan__btn--featured"

                  data-navigate-to="">Choose</button>
        </div>

        <div class="funnel-plan"
             data-element-type="plan"
             data-editable="true"
             data-plan-id="lifetime">
          <div class="funnel-plan__name" data-element-type="plan-name" data-editable="true">Lifetime</div>
          <div class="funnel-plan__price" data-element-type="plan-price" data-editable="true">
            <span class="funnel-plan__currency">$</span>
            <span class="funnel-plan__amount">199</span>
            <span class="funnel-plan__period"> once</span>
          </div>
          <button class="funnel-plan__btn" data-element-type="plan-btn" data-navigate-to="">Choose</button>
        </div>

      </div>

      <div class="funnel-guarantee"

        <span class="funnel-guarantee__icon" aria-hidden="true">🛡️</span>
        <div>
          <p class="funnel-guarantee__title"

             data-editable="true">30-Day Money-Back Guarantee</p>
          <p class="funnel-guarantee__desc"
             data-element-type="description"
             data-editable="true">Not satisfied? Full refund, no questions asked.</p>
        </div>
      </div>

    </div>
