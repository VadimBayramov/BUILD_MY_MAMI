<!--
  @component: loader-spinner
  @category: feedback
  @tags: loader, spinner, loading
  @description: Simple loading spinner
  @thumbnail: /thumbnails/loader-spinner.png
  @version: 1.0
-->
<div class="funnel-spinner-block"
     data-component="loader-spinner"
     data-component-category="feedback"
     data-element-type="spinner-block">

  <div class="funnel-spinner" data-element-type="spinner" aria-label="Loading" role="status">
    <span class="funnel-spinner__ring"></span>
  </div>

  <p class="funnel-spinner__text"
     data-element-type="spinner-text"
     data-editable="true">Loading…</p>

</div>

<style>
  .funnel-spinner-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: var(--pad-y) var(--pad-x);
    font-family: var(--font-family);
  }

  .funnel-spinner {
    width: 48px;
    height: 48px;
    position: relative;
  }

  .funnel-spinner__ring {
    display: block;
    width: 100%;
    height: 100%;
    border: 4px solid var(--border-tile);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .funnel-spinner__text {
    margin: 0;
    color: var(--text-muted);
    font-size: var(--body-size);
  }
</style>
